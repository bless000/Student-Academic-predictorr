name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ──────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt "pydantic[email]"

      - name: Generate dataset + train model
        working-directory: .
        run: |
          python scripts/generate_dataset.py
          python -c "
          import sys; sys.path.insert(0,'backend')
          import pandas as pd
          from app.ml.pipeline import train_and_evaluate
          df = pd.read_csv('data/students_dataset.csv')
          r = train_and_evaluate(df)
          print('Best model:', r['best_model'], r['best_accuracy'])
          "

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ─── Frontend Lint ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─── Deploy Backend (Render) ────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to Render
    needs: [backend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail
        continue-on-error: true

  # ─── Deploy Frontend (Vercel) ───────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [frontend-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        working-directory: frontend
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true
